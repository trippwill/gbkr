#:tombi schema.strict = false

[tools]
go = "1.25.7"
golangci-lint = "2.11.4"

[tasks.updeps]
description = "Update all dependencies to their latest versions"
confirm = """
Are you sure you want to update all dependencies to their latest versions?
This may introduce breaking changes.
"""
run = "go get -u ./..."
depends_post = ["tidy"]

[tasks.tidy]
run = "go mod tidy"
sources = ["go.mod", "**/*.go"]

[tasks.fmt]
depends = ["tidy"]
run = "go fmt ./..."
sources = ["**/*.go"]

[tasks.fmt-check]
depends = ["tidy"]
run = """
test -z "$(find . -name '*.go' -not -path './.tmp/*' | xargs gofmt -l)"
"""

[tasks.vet]
wait_for = ["fmt"]
run = "golangci-lint run ./..."

[tasks.build-base]
hide = true
depends = ["tidy"]
wait_for = ["fmt", "fmt-check", "vet"]
run = "go build ./..."
sources = ["**/*.go"]

[tasks.build]
depends = ["tidy", "vet", "build-base"]

[tasks.build-ci]
depends = ["tidy", "build-base"]

[tasks.build-grant-all]
description = "Build with gbkr_grant_all tag (includes GrantAllPrompter)"
depends = ["tidy", "vet"]
run = "go build -tags gbkr_grant_all ./..."

# -count=1 to disable go test caching
[tasks.test]
wait_for = ["tidy", "vet"]
run = "go test ./... -count=1"

[tasks.test-race]
wait_for = ["tidy", "vet"]
run = "go test ./... -count=1 -race"

[tasks.coverage]
wait_for = ["tidy", "vet"]
run = "go test ./... -coverprofile=coverage.out && go tool cover -html=coverage.out"

[tasks.coverage-ci]
wait_for = ["tidy", "vet"]
run = "go test ./... -coverprofile=coverage.out -covermode=atomic"

[tasks.ci]
depends = ["fmt-check", "vet", "build-ci"]
depends_post = ["coverage-ci"]

[tasks.precommit]
depends = ["fmt", "build", "flex:precommit"]
depends_post = ["test-race"]

[tasks."flex:tidy"]
description = "Run flex tidy from the repo root"
dir = "flex"
run = "mise run tidy"

[tasks."flex:fmt"]
description = "Run flex fmt from the repo root"
dir = "flex"
run = "mise run fmt"

[tasks."flex:fmt-check"]
description = "Run flex fmt-check from the repo root"
dir = "flex"
run = "mise run fmt-check"

[tasks."flex:vet"]
description = "Run flex vet from the repo root"
dir = "flex"
run = "mise run vet"

[tasks."flex:build"]
description = "Run flex build from the repo root"
dir = "flex"
run = "mise run build"

[tasks."flex:test"]
description = "Run flex test from the repo root"
dir = "flex"
run = "mise run test"

[tasks."flex:test-race"]
description = "Run flex test-race from the repo root"
dir = "flex"
run = "mise run test-race"

[tasks."flex:coverage"]
description = "Run flex coverage from the repo root"
dir = "flex"
run = "mise run coverage"

[tasks."flex:coverage-ci"]
description = "Run flex coverage-ci from the repo root"
dir = "flex"
run = "mise run coverage-ci"

[tasks."flex:ci"]
description = "Run flex CI from the repo root"
dir = "flex"
run = "mise run ci"

[tasks."flex:precommit"]
description = "Run flex precommit from the repo root"
dir = "flex"
run = "mise run precommit"
