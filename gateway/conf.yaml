listenPort: 5000
listenSsl: true
sslCert: "vertx.jks"
sslPwd: "mywebapi"

ip2loc: "US"
proxyRemoteSsl: true
proxyRemoteHost: "https://api.ibkr.com"
svcEnvironment: "v1"
authDelay: 3000
portalBaseURL: ""

serverOptions:
  blockedThreadCheckInterval: 1000000
  eventLoopPoolSize: 20
  workerPoolSize: 20
  maxWorkerExecuteTime: 100
  internalBlockingPoolSize: 20

cors:
  origin.allowed: "*"
  allowCredentials: false

ips:
  allow:
    - 127.0.0.1
    - 172.*
    - 10.*
    - 192.168.*
  deny: []
